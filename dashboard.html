<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Dashboard</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    max-width:500px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

#welcome{
    text-align:center;
    margin-bottom:20px;
}

#welcome img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

select,input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#4a0080;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

<div id="welcome"></div>

<h2 align="center">
Student Dashboard
</h2>

<select id="classSelect">

<option value="">
Select Class
</option>

<option value="jss1">
JSS1
</option>
<option value="jss2">
JSS2
</option>
<option value="jss3">
JSS3
</option>

</select>

<select id="subjectSelect">

<option value="">
Select Subject
</option>

<option value="mathematics">
Mathematics
</option>
<option value="english_language">
English Language
</option>

</select>

<input
type="password"
id="subjectPassword"
placeholder="Enter Subject Password"
>

<button onclick="startExam()">
Start Exam
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyAheDyeEzANwioxqAggNU5b9F4mPRTsOKU",
authDomain:"exam-records-system.firebaseapp.com",
projectId:"exam-records-system",
storageBucket:"exam-records-system.firebasestorage.app",
messagingSenderId:"754454130857",
appId:"1:754454130857:web:fe4923b11d5402389179b8"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const student =
JSON.parse(
localStorage.getItem("loggedInStudent")
);

if(!student){

alert("Please Sign In First");

window.location.href =
"sign_in.html";

}

document.getElementById("welcome")
.innerHTML =

`
<img src="${student.image}">
<h3>
Welcome ${student.username}
</h3>
`;

window.startExam = async function(){

const selectedClass =
document.getElementById("classSelect").value;

const selectedSubject =
document.getElementById("subjectSelect").value;

const password =
document.getElementById("subjectPassword")
.value.trim();

if(password !== "math123"){

alert("Invalid Subject Password");
return;

}

const examId =
`${selectedClass}_${selectedSubject}`;

const attemptRef =
doc(db,"exam_attempt",examId);

const attemptSnap =
await getDoc(attemptRef);

if(attemptSnap.exists()){

const data =
attemptSnap.data();

if(
data[student.username.toLowerCase()]
=== true
){

alert(
"You have already attempted this exam"
);

window.location.href =
"sign_in.html";

return;

}

}

window.location.href =
`${examId}_exam.html`;

}

</script>

</body>
</html>
