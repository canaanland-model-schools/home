<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    max-width:500px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

h2{
    text-align:center;
    color:#4a0080;
}

select,input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#4a0080;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#6a00b3;
}

</style>
</head>
<body>

<div class="container">

<h2>Student Dashboard</h2>

<select id="classSelect">

<option value="">Select Class</option>

<option value="jss1">
JSS1
</option>

</select>

<select id="subjectSelect">

<option value="">Select Subject</option>

<option value="mathematics">
Mathematics
</option>

</select>

<input
type="password"
id="subjectPassword"
placeholder="Enter Subject Password"
>

<button onclick="startExam()">
Start Exam
</button>

</div>

<script>

window.startExam = function(){

const selectedClass =
document.getElementById("classSelect").value;

const selectedSubject =
document.getElementById("subjectSelect").value;

const password =
document.getElementById("subjectPassword").value.trim();

if(!selectedClass || !selectedSubject){

alert("Select class and subject");
return;

}

if(password !== "math123"){

alert("Invalid Subject Password");
return;

}

window.location.href =
`${selectedClass}_${selectedSubject}_exam.html`;

}

</script>

</body>
</html>
