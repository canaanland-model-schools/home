<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Student Sign In</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    max-width:450px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
}

.logo img{
    width:120px;
    height:120px;
    border-radius:50%;
}

h2{
    text-align:center;
    color:#4a0080;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#4a0080;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#6a00b3;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">
<img src="img/Ctemplogo.png">
</div>

<h2>CANAANLAND CBT PORTAL</h2>

<input type="text" id="username" placeholder="Username">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Sign In
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyAheDyeEzANwioxqAggNU5b9F4mPRTsOKU",
authDomain:"exam-records-system.firebaseapp.com",
projectId:"exam-records-system",
storageBucket:"exam-records-system.firebasestorage.app",
messagingSenderId:"754454130857",
appId:"1:754454130857:web:fe4923b11d5402389179b8"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const students = [

{
username:"admin",
email:"admin@gmail.com",
password:"12345",
image:"img/admin.png"
},

{
username:"john",
email:"john@gmail.com",
password:"12345",
image:"img/john.png"
},

{
username:"mary",
email:"mary@gmail.com",
password:"12345",
image:"img/mary.png"
}

];

window.login = async function(){

const username =
document.getElementById("username")
.value.trim().toLowerCase();

const email =
document.getElementById("email")
.value.trim().toLowerCase();

const password =
document.getElementById("password")
.value.trim();

const student = students.find(s =>

s.username === username &&
s.email === email &&
s.password === password

);

if(!student){

alert("Invalid Login Details");
return;

}

/* SAVE SESSION */

localStorage.setItem(
"loggedInStudent",
JSON.stringify(student)
);

/* AUTO CREATE FIRESTORE RECORD */

try{

const recordRef =
doc(db,"exam_records",username);

const snap =
await getDoc(recordRef);

if(!snap.exists()){

await setDoc(recordRef,{

student_name: username,
email: email,
class: "JSS1",
created_at: new Date().toISOString()

});

}

}
catch(error){

console.log(error);

}

alert("Login Successful");

window.location.href =
"dashboard.html";

}

</script>

</body>
</html>
