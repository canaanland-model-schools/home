<!DOCTYPE html>
<html>
<head>
<title>Register</title>
</head>
<body>

<h2>Register</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAheDyeEzANwioxqAggNU5b9F4mPRTsOKU",
  authDomain: "exam-records-system.firebaseapp.com",
  projectId: "exam-records-system",
  appId: "1:754454130857:web:fe4923b11d5402389179b8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = async function () {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    document.getElementById('msg').innerText = "Registered successfully!";
    setTimeout(() => location.href = "login.html", 1000);
  } catch (error) {
    document.getElementById('msg').innerText = error.message;
  }
}
</script>

</body>
</html>
